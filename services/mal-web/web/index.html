<title>OpenMalLab Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /* ============================================================
     OpenMalLab analyst console
     Cool, chosen neutrals + brushed-silver chrome; semantic severity is
     the only loud color. Surfaces are lit from above (top highlight + a
     whisper of gradient) for a machined, premium feel. The score gauge is
     the one jewel: a severity-colored arc with a soft aura.
     ============================================================ */
  :root {
    --ground: #090b10;
    --ground-2: #0c0f16;
    --surface: #10131b;
    --surface-2: #151925;
    --surface-3: #1b2130;
    --hairline: #232a39;
    --hairline-soft: #191f2b;
    --edge-hi: rgba(255, 255, 255, 0.045);
    --text: #eaedf4;
    --text-2: #9aa4b8;
    --text-3: #626c80;
    --accent: #b7c4d6;
    --accent-dim: #6d7a8d;
    --mal: #ff5f5f;
    --sus: #ffb444;
    --unk: #8b93a7;
    --ben: #43d19a;
    --mal-bg: rgba(255, 95, 95, 0.13);
    --sus-bg: rgba(255, 180, 68, 0.13);
    --unk-bg: rgba(139, 147, 167, 0.13);
    --ben-bg: rgba(67, 209, 154, 0.13);
    --glow-mal: rgba(255, 95, 95, 0.28);
    --glow-sus: rgba(255, 180, 68, 0.26);
    --glow-unk: rgba(139, 147, 167, 0.16);
    --glow-ben: rgba(67, 209, 154, 0.24);
    --shadow: 0 1px 0 var(--edge-hi) inset, 0 10px 34px rgba(0, 0, 0, 0.45);
    --shadow-lg: 0 1px 0 var(--edge-hi) inset, 0 24px 60px rgba(0, 0, 0, 0.5);
    --radius: 14px;
    --radius-sm: 9px;
    --grad-surf: linear-gradient(180deg, var(--surface-2), var(--surface));
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ground: #e9edf3; --ground-2: #eef1f6; --surface: #ffffff; --surface-2: #f7f9fc; --surface-3: #eef2f7;
      --hairline: #dce2ec; --hairline-soft: #e8ecf2; --edge-hi: rgba(255, 255, 255, 0.9);
      --text: #12151d; --text-2: #515c72; --text-3: #8891a3;
      --accent: #48586f; --accent-dim: #8894a8;
      --mal: #e13838; --sus: #c07d0c; --unk: #626d82; --ben: #12995e;
      --mal-bg: rgba(225, 56, 56, 0.10); --sus-bg: rgba(192, 125, 12, 0.13); --unk-bg: rgba(98, 109, 130, 0.10); --ben-bg: rgba(18, 153, 94, 0.10);
      --glow-mal: rgba(225, 56, 56, 0.18); --glow-sus: rgba(192, 125, 12, 0.18); --glow-unk: rgba(98, 109, 130, 0.12); --glow-ben: rgba(18, 153, 94, 0.16);
      --shadow: 0 1px 0 var(--edge-hi) inset, 0 6px 20px rgba(20, 24, 33, 0.08);
      --shadow-lg: 0 1px 0 var(--edge-hi) inset, 0 18px 44px rgba(20, 24, 33, 0.12);
    }
  }
  :root[data-theme="dark"] {
    --ground: #090b10; --ground-2: #0c0f16; --surface: #10131b; --surface-2: #151925; --surface-3: #1b2130;
    --hairline: #232a39; --hairline-soft: #191f2b; --edge-hi: rgba(255,255,255,.045);
    --text: #eaedf4; --text-2: #9aa4b8; --text-3: #626c80; --accent: #b7c4d6; --accent-dim: #6d7a8d;
    --mal: #ff5f5f; --sus: #ffb444; --unk: #8b93a7; --ben: #43d19a;
    --mal-bg: rgba(255,95,95,.13); --sus-bg: rgba(255,180,68,.13); --unk-bg: rgba(139,147,167,.13); --ben-bg: rgba(67,209,154,.13);
    --glow-mal: rgba(255,95,95,.28); --glow-sus: rgba(255,180,68,.26); --glow-unk: rgba(139,147,167,.16); --glow-ben: rgba(67,209,154,.24);
    --shadow: 0 1px 0 var(--edge-hi) inset, 0 10px 34px rgba(0,0,0,.45); --shadow-lg: 0 1px 0 var(--edge-hi) inset, 0 24px 60px rgba(0,0,0,.5);
  }
  :root[data-theme="light"] {
    --ground: #e9edf3; --ground-2: #eef1f6; --surface: #fff; --surface-2: #f7f9fc; --surface-3: #eef2f7;
    --hairline: #dce2ec; --hairline-soft: #e8ecf2; --edge-hi: rgba(255,255,255,.9);
    --text: #12151d; --text-2: #515c72; --text-3: #8891a3; --accent: #48586f; --accent-dim: #8894a8;
    --mal: #e13838; --sus: #c07d0c; --unk: #626d82; --ben: #12995e;
    --mal-bg: rgba(225,56,56,.10); --sus-bg: rgba(192,125,12,.13); --unk-bg: rgba(98,109,130,.10); --ben-bg: rgba(18,153,94,.10);
    --glow-mal: rgba(225,56,56,.18); --glow-sus: rgba(192,125,12,.18); --glow-unk: rgba(98,109,130,.12); --glow-ben: rgba(18,153,94,.16);
    --shadow: 0 1px 0 var(--edge-hi) inset, 0 6px 20px rgba(20,24,33,.08); --shadow-lg: 0 1px 0 var(--edge-hi) inset, 0 18px 44px rgba(20,24,33,.12);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; color: var(--text); font-family: var(--sans);
    font-size: 14px; line-height: 1.5;
    background:
      radial-gradient(1100px 620px at 78% -8%, var(--ground-2), transparent 60%),
      radial-gradient(900px 500px at 0% 100%, var(--ground-2), transparent 55%),
      var(--ground);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent); color: var(--ground); }
  .mono { font-family: var(--mono); }
  .tnum { font-variant-numeric: tabular-nums; }

  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

  /* ---- topbar: frosted brushed-metal rail ---- */
  .topbar {
    display: flex; align-items: center; gap: 16px; padding: 0 22px; height: 58px;
    border-bottom: 1px solid var(--hairline);
    background: color-mix(in srgb, var(--surface) 78%, transparent);
    backdrop-filter: blur(16px) saturate(1.2); -webkit-backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: 0 1px 0 var(--edge-hi) inset; position: relative; z-index: 5;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { display: block; filter: drop-shadow(0 0 6px rgba(255, 95, 95, 0.25)); }
  .brand .hex-outer { stroke: var(--accent); fill: rgba(183, 196, 214, 0.05); }
  .brand .core { fill: var(--mal); }
  .brand .bars line { stroke: var(--accent); stroke-width: 1.25; stroke-linecap: round; }
  .brand .name { font-weight: 660; letter-spacing: .2px; font-size: 15.5px; }
  .brand .name b { color: var(--mal); font-weight: 660; text-shadow: 0 0 14px var(--glow-mal); }
  .brand .kicker { font-family: var(--mono); font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--text-3); margin-top: 2px; }
  .topbar .spacer { flex: 1; }
  .live {
    display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px;
    color: var(--text-2); padding: 6px 12px; border: 1px solid var(--hairline); border-radius: 999px;
    background: var(--surface-2); letter-spacing: .02em;
  }
  .live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 0 var(--accent); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(120, 200, 170, .5); } 70% { box-shadow: 0 0 0 7px rgba(120, 200, 170, 0); } 100% { box-shadow: 0 0 0 0 rgba(120, 200, 170, 0); } }
  .icon-btn {
    display: inline-grid; place-items: center; width: 35px; height: 35px; border: 1px solid var(--hairline);
    border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text-2); cursor: pointer;
    transition: color .15s, border-color .15s, transform .15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent-dim); transform: translateY(-1px); }
  .icon-btn:active { transform: translateY(0); }

  .body { display: grid; grid-template-columns: 392px 1fr; overflow: hidden; }
  @media (max-width: 900px) {
    .body { grid-template-columns: 1fr; }
    .detail { display: none; }
    .body.show-detail .queue { display: none; }
    .body.show-detail .detail { display: block; }
  }

  /* ---- queue ---- */
  .queue { border-right: 1px solid var(--hairline); display: flex; flex-direction: column; min-height: 0; background: var(--surface); }
  .queue-head { display: flex; align-items: baseline; justify-content: space-between; padding: 18px 20px 12px; }
  .queue-head h2 { margin: 0; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-3); font-weight: 650; }
  .queue-head .count { font-family: var(--mono); font-size: 11px; color: var(--text-2); font-variant-numeric: tabular-nums; padding: 3px 9px; border: 1px solid var(--hairline); border-radius: 999px; background: var(--surface-2); }
  .queue-list {
    overflow-y: auto; padding: 4px 12px 16px; display: flex; flex-direction: column; gap: 5px;
    scrollbar-width: thin; scrollbar-color: var(--hairline) transparent;
    -webkit-mask-image: linear-gradient(180deg, transparent, #000 14px, #000 calc(100% - 14px), transparent);
    mask-image: linear-gradient(180deg, transparent, #000 14px, #000 calc(100% - 14px), transparent);
  }
  .queue-list::-webkit-scrollbar { width: 9px; }
  .queue-list::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }

  .row {
    position: relative; display: grid; grid-template-columns: 42px 1fr auto; gap: 13px; align-items: center;
    padding: 12px 14px 12px 15px; border-radius: var(--radius-sm); cursor: pointer;
    border: 1px solid transparent; background: transparent;
    transition: background .14s, border-color .14s, transform .14s;
  }
  .row::before { content: ""; position: absolute; left: 5px; top: 12px; bottom: 12px; width: 3px; border-radius: 3px; background: var(--sev); opacity: .55; transition: opacity .14s, top .14s, bottom .14s; }
  .row:hover { background: var(--surface-2); transform: translateX(2px); }
  .row:hover::before { opacity: .85; top: 9px; bottom: 9px; }
  .row.sel { background: linear-gradient(180deg, var(--surface-3), var(--surface-2)); border-color: var(--hairline); box-shadow: var(--shadow); }
  .row.sel::before { opacity: 1; top: 8px; bottom: 8px; box-shadow: 0 0 10px var(--sev); }
  .row .meta { min-width: 0; }
  .row .fname { font-family: var(--mono); font-size: 12.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .sub { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 11px; color: var(--text-3); }
  .row .sub .ftype { color: var(--text-2); font-family: var(--mono); }
  .row .sub .d { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: .5; flex: none; }
  .row .right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

  .verdict-tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; font-weight: 650; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; }
  .v-mal { color: var(--mal); background: var(--mal-bg); } .v-sus { color: var(--sus); background: var(--sus-bg); }
  .v-unk { color: var(--unk); background: var(--unk-bg); } .v-ben { color: var(--ben); background: var(--ben-bg); }

  .conf { display: inline-flex; gap: 3px; align-items: center; }
  .conf i { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); opacity: .3; }
  .conf i.on { opacity: 1; background: var(--text-2); }
  .conf.c-high i.on { background: var(--text); }

  /* ---- mini + hero gauge ---- */
  .gm { display: grid; place-items: center; }
  .gauge-wrap { position: relative; width: 138px; height: 138px; display: grid; place-items: center; }
  .gauge-wrap::before { content: ""; position: absolute; width: 118px; height: 118px; border-radius: 50%; background: radial-gradient(closest-side, var(--aura), transparent 72%); filter: blur(6px); opacity: .9; }
  .gauge-wrap .num { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; }
  .gauge-wrap .num .score { font-family: var(--mono); font-size: 38px; font-weight: 600; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -1.5px; color: var(--sev); text-shadow: 0 0 22px var(--aura); }
  .gauge-wrap .num .of { font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: .28em; margin-top: 7px; }

  /* ---- detail ---- */
  .detail { overflow-y: auto; min-height: 0; scrollbar-width: thin; scrollbar-color: var(--hairline) transparent; }
  .detail::-webkit-scrollbar { width: 11px; } .detail::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 7px; border: 3px solid transparent; background-clip: padding-box; }
  .detail-inner { max-width: 940px; margin: 0 auto; padding: 30px 34px 90px; }
  .detail-inner.enter { animation: fadeUp .4s cubic-bezier(.2, .8, .2, 1) both; }
  .back-btn { display: none; margin-bottom: 16px; }
  @media (max-width: 900px) { .back-btn { display: inline-flex; } }

  .hero { display: grid; grid-template-columns: auto 1fr; gap: 30px; align-items: center; }
  .hero-info { min-width: 0; }
  .hero-verdict { display: flex; align-items: center; gap: 13px; flex-wrap: wrap; }
  .hero-verdict .big { font-size: 30px; font-weight: 700; letter-spacing: -.4px; line-height: 1.05; }
  .m-mal { color: var(--mal); text-shadow: 0 0 26px var(--glow-mal); } .m-sus { color: var(--sus); text-shadow: 0 0 26px var(--glow-sus); }
  .m-unk { color: var(--unk); } .m-ben { color: var(--ben); text-shadow: 0 0 26px var(--glow-ben); }
  .incomplete-tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--sus); border: 1px solid color-mix(in srgb, var(--sus) 45%, transparent); border-radius: 6px; padding: 3px 8px; }
  .hero-sub { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px 26px; }
  .hero-sub > div { display: flex; flex-direction: column; gap: 4px; }
  .hero-sub .k { color: var(--text-3); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
  .hero-sub .v { font-family: var(--mono); font-size: 12.5px; color: var(--text); }
  .hash { cursor: copy; word-break: break-all; border-bottom: 1px dashed var(--hairline); transition: color .15s; }
  .hash:hover { color: var(--accent); }
  .conf-line { display: inline-flex; align-items: center; gap: 9px; }
  .conf-line .label { font-family: var(--mono); font-size: 11px; color: var(--text-2); }

  .sectlabel { font-size: 10.5px; letter-spacing: .2em; text-transform: uppercase; color: var(--text-3); font-weight: 650; margin: 38px 0 16px; display: flex; align-items: center; gap: 14px; }
  .sectlabel::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--hairline), transparent); }

  /* ---- evidence tree ---- */
  .artifact { position: relative; border: 1px solid var(--hairline); border-radius: var(--radius); background: var(--grad-surf); margin-bottom: 13px; overflow: hidden; box-shadow: var(--shadow); }
  .artifact::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--sev); opacity: .8; }
  .artifact-head { display: flex; align-items: center; gap: 13px; padding: 14px 17px; cursor: pointer; user-select: none; transition: background .14s; }
  .artifact-head:hover { background: var(--surface-2); }
  .chev { color: var(--text-3); transition: transform .2s ease; flex: none; }
  .artifact.open .chev { transform: rotate(90deg); }
  .artifact-title { min-width: 0; flex: 1; }
  .crumb { font-family: var(--mono); font-size: 12.5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .crumb .seg { color: var(--text-2); } .crumb .sep { color: var(--text-3); } .crumb .leaf { color: var(--text); font-weight: 600; }
  .artifact-title .sha { font-family: var(--mono); font-size: 10px; color: var(--text-3); margin-top: 4px; }
  .rollup { display: flex; align-items: center; gap: 9px; flex: none; }
  .ftype-pill { font-family: var(--mono); font-size: 10px; color: var(--text-2); background: var(--surface-3); border: 1px solid var(--hairline); border-radius: 6px; padding: 3px 8px; }
  .artifact-body { border-top: 1px solid var(--hairline-soft); display: none; }
  .artifact.open .artifact-body { display: block; animation: fadeUp .28s ease both; }

  .engine { border-top: 1px solid var(--hairline-soft); }
  .engine:first-child { border-top: none; }
  .engine-head { display: flex; align-items: center; gap: 9px; padding: 11px 17px 6px; font-family: var(--mono); font-size: 10.5px; letter-spacing: .04em; color: var(--text-2); }
  .engine-head .eng-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-dim); box-shadow: 0 0 6px var(--accent-dim); }
  .engine-head .eng-count { color: var(--text-3); }
  .finding { display: grid; grid-template-columns: 12px 1fr auto; gap: 12px; align-items: start; padding: 9px 17px 9px 17px; border-top: 1px solid var(--hairline-soft); }
  .engine-head + .finding { border-top: none; }
  .finding .fdot { width: 7px; height: 7px; border-radius: 50%; margin-top: 6px; background: var(--fsev); box-shadow: 0 0 7px var(--fsev); }
  .finding .fdetail { font-family: var(--mono); font-size: 12.5px; color: var(--text); word-break: break-word; line-height: 1.45; }
  .finding .fmeta { display: flex; align-items: center; gap: 9px; margin-top: 4px; }
  .finding .ftype-lbl { font-size: 10.5px; color: var(--text-3); }
  .finding .fverd { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--fsev); }
  .finding .attck { font-family: var(--mono); font-size: 10.5px; color: var(--text-2); background: var(--surface-3); border: 1px solid var(--hairline); border-radius: 6px; padding: 3px 8px; white-space: nowrap; align-self: start; margin-top: 1px; letter-spacing: .04em; }

  .empty { display: grid; place-content: center; justify-items: center; height: 100%; text-align: center; color: var(--text-3); gap: 16px; padding: 40px; }
  .empty .mk { opacity: .5; }
  .empty .t { font-size: 15px; color: var(--text-2); font-weight: 550; }
  .empty .s { font-size: 13px; max-width: 320px; line-height: 1.6; }

  .footnote { margin-top: 34px; font-size: 12px; color: var(--text-3); line-height: 1.65; border-top: 1px solid var(--hairline); padding-top: 18px; }

  .preview-banner { font-family: var(--mono); font-size: 10.5px; color: var(--sus); background: var(--sus-bg); border-bottom: 1px solid color-mix(in srgb, var(--sus) 28%, transparent); padding: 7px 22px; text-align: center; letter-spacing: .04em; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rowIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
  .row.anim { animation: rowIn .34s cubic-bezier(.2, .8, .2, 1) both; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 5px; }
</style>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <path class="hex-outer" d="M13 1.6 22.9 7.3v11.4L13 24.4 3.1 18.7V7.3L13 1.6Z" stroke-width="1.6" />
        <circle class="core" cx="13" cy="13.2" r="3.3" />
        <g class="bars">
          <line x1="9.5" y1="7.8" x2="9.5" y2="18.2" />
          <line x1="13" y1="7.2" x2="13" y2="18.8" />
          <line x1="16.5" y1="7.8" x2="16.5" y2="18.2" />
        </g>
      </svg>
      <div>
        <div class="name">Open<b>Mal</b>Lab</div>
        <div class="kicker">Analysis Console</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="live" id="live"><span class="dot"></span><span id="live-text">connecting</span></div>
    <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" /></svg>
    </button>
  </header>

  <div class="body" id="body">
    <aside class="queue">
      <div class="queue-head">
        <h2>Triage queue</h2>
        <span class="count" id="qcount"></span>
      </div>
      <div class="queue-list" id="queue-list" role="listbox" aria-label="Submissions" tabindex="0"></div>
    </aside>
    <main class="detail" id="detail">
      <div class="empty" id="detail-empty">
        <svg class="mk" width="52" height="52" viewBox="0 0 26 26" fill="none">
          <path d="M13 1.6 22.9 7.3v11.4L13 24.4 3.1 18.7V7.3L13 1.6Z" stroke="var(--text-3)" stroke-width="1.2" />
          <g stroke="var(--text-3)" stroke-width="1"><line x1="9.5" y1="8" x2="9.5" y2="18" /><line x1="13" y1="7.4" x2="13" y2="18.6" /><line x1="16.5" y1="8" x2="16.5" y2="18" /></g>
        </svg>
        <div class="t">Select a specimen</div>
        <div class="s">Pick a submission from the triage queue to see its verdict and the evidence behind it.</div>
      </div>
    </main>
  </div>
</div>

<script>
