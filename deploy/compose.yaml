# The whole phase-1 control node in one compose file.
#
# Stateful set: Postgres, Temporal (auto-setup), SeaweedFS, OpenBao.
# Control plane: mal-gateway (front door, publishes :8080) and
# mal-orchestrator (temporal worker; spawns the jailed analysis containers
# as siblings through the engine socket).
#
# The jailed images (mal-static-yara, mal-broker) are never started by
# compose. They sit behind the "build" profile so one command produces them,
# and the orchestrator runs them per submission under the isolation recipe
# proven in deploy/proof/boundary-proof.sh:
#
#   docker compose -f deploy/compose.yaml --profile build build
#   docker compose -f deploy/compose.yaml up -d
#
# Image tags below are public and floating for local dev. In an air-gapped
# or corporate setup, point them at your own registry and pin exact digests.
# The passwords here are local-dev-only placeholders; real secrets come from
# OpenBao, never from this file.

name: openmallab

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: openmallab
      POSTGRES_PASSWORD: local-dev-only
      POSTGRES_DB: openmallab
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  temporal:
    image: temporalio/auto-setup:1.24
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: openmallab
      POSTGRES_PWD: local-dev-only
      POSTGRES_SEEDS: postgres
      # a fresh clone gets the working namespace without any manual step.
      DEFAULT_NAMESPACE: openmallab
      DEFAULT_NAMESPACE_RETENTION: 72h
    ports:
      - "7233:7233"

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data"
    volumes:
      - seaweed:/data
    ports:
      - "8333:8333"
      - "9333:9333"

  openbao:
    image: openbao/openbao:latest
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: local-dev-only
    ports:
      - "8200:8200"

  # one-shot: the vault volume belongs to nobody (65534) so the non-root
  # gateway can write artifacts and the jailed workers (also 65534) can read
  # the one file each gets mounted. idempotent on every up.
  vault-init:
    image: busybox:1.36
    command: ["sh", "-c", "chown 65534:65534 /vault && chmod 0700 /vault"]
    volumes:
      - vault:/vault
    restart: "no"

  gateway:
    build:
      context: ..
      dockerfile: services/mal-gateway/Dockerfile
    image: openmallab/mal-gateway:m0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: openmallab
      MAL_VAULT_DIR: /vault
    ports:
      - "8080:8080"
    volumes:
      - vault:/vault
    tmpfs:
      # multipart parsing spools big uploads to /tmp; the rootfs is read-only.
      - /tmp:size=300m,mode=1777
    depends_on:
      temporal:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    user: "65534:65534"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: services/mal-web/Dockerfile
    image: openmallab/mal-web:m0
    environment:
      MAL_GATEWAY_URL: http://gateway:8080
    ports:
      - "8090:8090"
    depends_on:
      gateway:
        condition: service_started
    user: "65534:65534"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges
    restart: unless-stopped

  orchestrator:
    build:
      context: ..
      dockerfile: services/mal-orchestrator/Dockerfile
    image: openmallab/mal-orchestrator:m0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: openmallab
      MAL_VAULT_VOLUME: openmallab-vault
      MAL_VAULT_DIR: /vault
      MAL_EXTRACT_STAGING_DIR: /staging
      MAL_EXTRACT_STAGING_VOLUME: openmallab-extract-staging
      MAL_WORKER_IMAGE: openmallab/mal-static-yara:m0
      MAL_IDENT_IMAGE: openmallab/mal-ident:m0
      MAL_EXTRACT_IMAGE: openmallab/mal-extract:m0
      MAL_CAPA_IMAGE: openmallab/mal-capa:m0
      MAL_FLOSS_IMAGE: openmallab/mal-floss:m0
      MAL_DETONATE_IMAGE: openmallab/mal-detonate:m0
      # mal-static-die (Detect It Easy) is OFF by default: this stays empty until you
      # build its image on a clean network (`--profile build-die build`) and export
      # MAL_DIE_IMAGE=openmallab/mal-static-die:m0 to turn it on (see docs/DIE-HANDOFF.md).
      # empty -> DieActivity is a no-op, so it never floors or pollutes a submission.
      MAL_DIE_IMAGE: ${MAL_DIE_IMAGE:-}
      MAL_BROKER_IMAGE: openmallab/mal-broker:m0
    volumes:
      # the engine socket is the spawn authority in phase 1: the orchestrator
      # creates the jailed sibling containers through it. root against the
      # socket, read-only and cap-dropped everywhere else. mediating this
      # behind a narrower spawner api is later-phase work.
      - /var/run/docker.sock:/var/run/docker.sock
      # the orchestrator is the persistence broker: it writes the vault (the
      # gateway seeds uploads, the orchestrator ingests extracted children,
      # both content-addressed). workers only ever read one file via subpath.
      - vault:/vault
      # extract staging: the extractor writes children into a per-run subpath
      # here; the orchestrator reads them back, re-hashes, and ingests. shared
      # only between the orchestrator and the extractor jails it spawns.
      - extract_staging:/staging
    depends_on:
      temporal:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    user: "0:0"
    read_only: true
    cap_drop: [ALL]
    # the orchestrator is the persistence broker: it owns the vault and the
    # extract staging area, so it needs to set file ownership (CHOWN) and read
    # back children written by the unprivileged extractor (DAC_OVERRIDE). these
    # two are trivial next to the docker socket it already holds, and the
    # hostile-input workers it spawns still run with ALL caps dropped.
    cap_add: [CHOWN, DAC_OVERRIDE]
    security_opt:
      - no-new-privileges
    restart: unless-stopped

  # build-only entries for the jailed images. never `up` these; the
  # orchestrator spawns them per submission under the isolation recipe.
  mal-static-yara:
    profiles: [build]
    build:
      context: ..
      dockerfile: services/mal-static-yara/Dockerfile
    image: openmallab/mal-static-yara:m0

  mal-ident:
    profiles: [build]
    build:
      context: ..
      dockerfile: services/mal-ident/Dockerfile
    image: openmallab/mal-ident:m0

  mal-extract:
    profiles: [build]
    build:
      context: ..
      dockerfile: services/mal-extract/Dockerfile
    image: openmallab/mal-extract:m0

  mal-capa:
    profiles: [build]
    build:
      context: ..
      dockerfile: services/mal-capa/Dockerfile
      # optional private-index credential for the capa pip install; absent on a
      # clean network (public PyPI). set MAL_PIP_CONF to your pip.conf path.
      secrets:
        - pip_conf
    image: openmallab/mal-capa:m0

  mal-floss:
    profiles: [build]
    build:
      context: ..
      dockerfile: services/mal-floss/Dockerfile
      secrets:
        - pip_conf
    image: openmallab/mal-floss:m0

  # dynamic-analysis worker: detonates an ELF under a jailed qemu-user emulator and
  # mines the syscall trace. stdlib python + apt-installed emulator, so no pip and no
  # build secret. on a clean network this builds normally; on a proxy that firewalls
  # the BuildKit sandbox, build with the legacy builder (DOCKER_BUILDKIT=0).
  mal-detonate:
    profiles: [build]
    build:
      context: ..
      dockerfile: services/mal-detonate/Dockerfile
    image: openmallab/mal-detonate:m0

  # packer / compiler / crypto fingerprinting (Detect It Easy). NOT in the default
  # `build` profile on purpose: its image fetches DIE from a GitHub release at build
  # time, so the standard `docker compose --profile build build` (and CI) must not
  # attempt it until the release is pinned and verified on a clean network. build it
  # deliberately with `docker compose --profile build-die build` (see docs/DIE-HANDOFF.md).
  mal-static-die:
    profiles: [build-die]
    build:
      context: ..
      dockerfile: services/mal-static-die/Dockerfile
    image: openmallab/mal-static-die:m0

  mal-broker:
    profiles: [build]
    build:
      context: ..
      dockerfile: services/mal-broker/Dockerfile
    image: openmallab/mal-broker:m0

secrets:
  # the capa build's optional private pip index (with its credential). set
  # MAL_PIP_CONF to your pip.conf to build behind a private index; unset, it
  # defaults to an empty file and pip uses public PyPI. never baked into a
  # layer (BuildKit secret), never committed.
  pip_conf:
    file: ${MAL_PIP_CONF:-/dev/null}

volumes:
  pgdata:
  seaweed:
  vault:
    # fixed name: the orchestrator passes it to the engine api when mounting
    # a single content-addressed file into a worker via volume-subpath.
    name: openmallab-vault
  extract_staging:
    # fixed name: the orchestrator mounts per-run subpaths of this into the
    # extractor as its writable /out, then reads the children back to ingest.
    name: openmallab-extract-staging
