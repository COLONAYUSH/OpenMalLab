# AI-analyst plane overlay (design sec 03/05). The base deploy/compose.yaml runs
# deterministic-only and air-gap-clean; this overlay adds the jailed Pydantic-AI
# roster AND a SOVEREIGN local model server, and turns the plane ON.
#
# ONE-TIME model provisioning (the model volume must be filled BEFORE `up`, because
# the runtime model server sits on a no-egress network and cannot pull at runtime):
#
#   docker compose -f deploy/compose.yaml -f deploy/compose.ai.yaml --profile bootstrap run --rm model-bootstrap
#
# then bring the live stack up:
#
#   docker compose -f deploy/compose.yaml -f deploy/compose.ai.yaml up
#
# the ollama healthcheck asserts the MODEL is present (not just the server), and
# mal-agents waits on it, so the plane can never come up half-provisioned. To use
# the guarded CLOUD model instead of the local one, set MAL_MODEL_URL to the remote
# endpoint + MAL_MODEL_KEY + MAL_ALLOW_CLOUD=1 (see provider.py / ASK.md LLM-3).
services:
  # sovereign local model server (OpenAI-compatible). serves the pre-provisioned
  # model on the no-egress aiplane network - nothing leaves the box. it CANNOT pull
  # at runtime (internal net); the one-time model-bootstrap below fills its volume.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - openmallab-models:/root/.ollama
    networks: [aiplane]
    expose: ["11434"]
    security_opt: [no-new-privileges]
    restart: unless-stopped
    healthcheck:
      # healthy ONLY when the server is up AND the model is present, so a dependent
      # service never starts against an unprovisioned model (the launch risk).
      test: ["CMD-SHELL", "ollama show ${MAL_MODEL_NAME:-llama3.2:3b} >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  # ONE-TIME model bootstrap (profile: bootstrap). runs on the DEFAULT egress-capable
  # network, pulls the model into the shared volume, then exits. after it completes
  # the runtime `ollama` above serves fully air-gapped. run it once (see header).
  model-bootstrap:
    image: ollama/ollama:latest
    profiles: ["bootstrap"]
    volumes:
      - openmallab-models:/root/.ollama
      # optional corporate TLS-interception CA (deploy/certs/*.pem, git-ignored).
      # empty on a clean network -> the block below is a harmless no-op.
      - ./certs:/certs:ro
    networks: [default]
    entrypoint: ["/bin/sh", "-c"]
    # trust the OS bundle plus any corp CA (so `ollama pull` works behind a proxy),
    # then serve + pull the model into the volume. clean network: only the OS bundle.
    command: ["touch /tmp/ca.pem; [ -f /etc/ssl/certs/ca-certificates.crt ] && cat /etc/ssl/certs/ca-certificates.crt >> /tmp/ca.pem; cat /certs/*.pem >> /tmp/ca.pem 2>/dev/null || true; export SSL_CERT_FILE=/tmp/ca.pem; ollama serve & until ollama list >/dev/null 2>&1; do sleep 1; done; n=0; until ollama pull ${MAL_MODEL_NAME:-llama3.2:3b}; do n=$$((n+1)); [ $$n -ge 120 ] && echo 'model pull failed after 120 resume attempts' && exit 1; echo \"pull dropped, resuming (attempt $$n)\"; sleep 3; done; echo 'model provisioned into openmallab-models'"]
    restart: "no"

  mal-agents:
    build:
      context: ..
      dockerfile: services/mal-agents/Dockerfile
      # the pip index credential (Artifactory) as a BuildKit secret, same as
      # capa/floss - never an ARG/layer. absent on a clean net -> public PyPI.
      secrets:
        - pip_conf
    image: openmallab/mal-agents:m0
    environment:
      # SOVEREIGN default: the local ollama container on the no-egress net. a
      # container/compose-service host is sovereign (no MAL_ALLOW_CLOUD needed); see
      # provider.py. override MAL_MODEL_URL for the guarded cloud path.
      MAL_MODEL_URL: ${MAL_MODEL_URL:-http://ollama:11434}
      MAL_MODEL_NAME: ${MAL_MODEL_NAME:-llama3.2:3b}
      # cloud egress is OFF unless a non-sovereign MAL_MODEL_URL AND this opt-in are
      # both set. the key is passed only when provided.
      MAL_MODEL_KEY: ${MAL_MODEL_KEY:-}
      MAL_ALLOW_CLOUD: ${MAL_ALLOW_CLOUD:-}
      # optional self-hosted Langfuse. unset -> no tracing (air-gapped default).
      MAL_LANGFUSE_URL: ${MAL_LANGFUSE_URL:-}
      MAL_LANGFUSE_PUBLIC_KEY: ${MAL_LANGFUSE_PUBLIC_KEY:-}
      MAL_LANGFUSE_SECRET_KEY: ${MAL_LANGFUSE_SECRET_KEY:-}
    # wait for the model to be provisioned + served before accepting work.
    depends_on:
      ollama:
        condition: service_healthy
    # hardened + isolated: no privileges, read-only rootfs, non-root (Dockerfile),
    # bounded resources (a runaway or hostile payload cannot exhaust the host), and
    # on an internal network with no egress. the Go broker-analogue Validate is the
    # trust boundary for everything this service returns.
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges]
    mem_limit: 1g
    cpus: "1.0"
    pids_limit: 256
    networks: [aiplane]
    expose: ["8099"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8099/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # point the orchestrator at the roster and join the isolated AI-plane network.
  # MAL_AGENTS_URL both enables the workflow handoff and names the roster endpoint.
  orchestrator:
    environment:
      MAL_AGENTS_URL: http://mal-agents:8099
      # PERSISTENT L0: curated knowledge (HITL gold labels + tier-1 learning) is
      # written here and survives a restart, so the spine does not forget what an
      # analyst taught it. on a named volume because the orchestrator rootfs is
      # read-only; unset this to fall back to the ephemeral in-memory store.
      MAL_KNOWLEDGE_DB: /knowledge/l0.db
    volumes:
      - openmallab-knowledge:/knowledge
    networks: [default, aiplane]

networks:
  # the AI plane is network-isolated: no route off the box. the model server and
  # Langfuse (when added) live here too - sovereign by construction.
  aiplane:
    internal: true

volumes:
  # holds the pre-provisioned model weights; filled once by model-bootstrap, then
  # mounted by the air-gapped runtime ollama. named explicitly so the bootstrap and
  # the runtime agree regardless of the compose project name.
  openmallab-models:
    name: openmallab-models
  # persistent L0 knowledge (curated facts + learned gold labels). survives restarts
  # so the spine keeps what analysts teach it; named so it is stable across projects.
  openmallab-knowledge:
    name: openmallab-knowledge

# ---------------------------------------------------------------------------
# Optional: self-hosted Langfuse for observability (ASK.md OBS-1). Uncomment +
# configure MAL_LANGFUSE_URL/PUBLIC_KEY/SECRET_KEY above.
#   langfuse:
#     image: langfuse/langfuse:latest
#     networks: [aiplane]
# ---------------------------------------------------------------------------
