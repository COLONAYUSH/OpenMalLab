# CI skeleton for OpenMalLab. These jobs pin the gates we care about; the real
# build steps get filled in as each service lands. Dependency resolution goes
# through the project's configured registries (set them as repo variables, for
# example an Artifactory GOPROXY, Cargo registry, npm registry, and PyPI index).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: placeholder
        run: echo "per-service lint and test get wired in as services land"

  license-gate:
    # Bidirectional and transitive. Fails on copyleft entering the Apache core,
    # AND on Apache or otherwise-incompatible licenses entering a copyleft worker.
    # Sees runtime and plugin linkage, not just SBOM manifests.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: placeholder
        run: echo "license gate gets wired in with the first real dependency"

  invariant-traceability:
    # Fails the build if any invariant or residual lacks a linked test id.
    # This is how we keep the fixes from silently regressing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: placeholder
        run: echo "traceability gate gets wired in with the first invariant test"

  fuzz:
    # Continuous fuzzing of the hostile-input parsers: mal-extract, mal-ident,
    # and the analyze-result broker.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: placeholder
        run: echo "fuzz targets get wired in with mal-extract"
